<!doctype html>
<html lang="en" class="dark">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#09090b" />
        
        <!-- SEO Meta Tags -->
        <meta name="description" content="Money Saarthi - Your F&O Trading Companion for Indian Stock Market. Real-time stock scanners, trading strategies, and market analysis tools." />
        <meta name="keywords" content="Money Saarthi, MoneySaarthi, F&O trading, Indian stock market, stock scanner, trading strategies, NSE, BSE, options trading, futures trading" />
        <meta name="author" content="Money Saarthi" />
        <meta name="robots" content="index, follow" />
        
        <!-- Preconnect hints for faster resource loading -->
        <link rel="preconnect" href="https://accounts.google.com" crossorigin />
        <link rel="dns-prefetch" href="https://accounts.google.com" />
        
        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://moneysaarthi.in/" />
        <meta property="og:title" content="Money Saarthi | F&O Trading Companion" />
        <meta property="og:description" content="Your trusted F&O Trading Companion for Indian Stock Market. Real-time scanners, strategies, and analysis tools." />
        <meta property="og:site_name" content="Money Saarthi" />
        
        <!-- Twitter -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Money Saarthi | F&O Trading Companion" />
        <meta name="twitter:description" content="Your trusted F&O Trading Companion for Indian Stock Market. Real-time scanners, strategies, and analysis tools." />
        
        <!-- PWA Manifest -->
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
        <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
        <link rel="icon" type="image/x-icon" href="%PUBLIC_URL%/favicon.ico" />
        <link rel="icon" type="image/png" sizes="192x192" href="%PUBLIC_URL%/logo192.png" />
        
        
        <!--
        manifest.json provides metadata used when your web app is installed on a
        user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
        -->
        <!--
        Notice the use of %PUBLIC_URL% in the tags above.
        It will be replaced with the URL of the `public` folder during the build.
        Only files inside the `public` folder can be referenced from the HTML.

        Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
        work correctly both with client-side routing and a non-root public URL.
        Learn how to configure a non-root public URL by running `npm run build`.
        -->
        <title>Money Saarthi | F&O Trading Companion</title>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
